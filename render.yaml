services:
  - type: web
    name: yelp-ai-intelligence-dashboard
    env: python
    plan: free
    buildCommand: bash render-build.sh
    startCommand: gunicorn --workers 1 --threads 2 --timeout 240 --graceful-timeout 60 flask_appfinal:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
